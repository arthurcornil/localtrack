<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Localtrack</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
		<link rel="stylesheet" href="style.css"/>
	</head>
	<body>
		<div class="app">
			<header>
				<div class="logo-block">
					<div class="logo">localtrack<span class="logo-dot">.</span></div>
					<div class="tagline">local-first time tracker</div>
				</div>
				<a href="https://github.com/arthurcornil/localtrack" target="_blank" class="github-link" aria-label="View on GitHub">
					<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="#6b6b78">
						<path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.929.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
					</svg>
				</a>
			</header>
			<div class="timer-block">
				<div class="timer-fields">
					<div class="field">
						<label>Description</label>
						<input id="timer-desc" type="text" placeholder="What are you working on?" />
					</div>
					<div class="field">
						<label>Project</label>
						<div class="project-input-wrapper">
							<input id="timer-project" type="text" placeholder="Client / project" autocomplete="off" />
							<div class="project-dropdown" id="timer-project-dropdown"></div>
						</div>
					</div>
				</div>
				<div class="timer-row">
					<div class="elapsed" id="elapsed">00:00:00</div>
					<button class="btn-start" id="btn-start">
						<span class="btn-icon"></span>
						<span id="btn-label">Start</span>
					</button>
				</div>
			</div>

			<div class="divider">or add manually</div>
			<div class="manual-block">
				<div class="manual-fields">
					<div class="field">
						<label>Description</label>
						<input id="manual-desc" type="text" placeholder="What did you work on?" />
					</div>
					<div class="field">
						<label>Project</label>
						<div class="project-input-wrapper">
							<input id="manual-project" type="text" placeholder="Client / project" autocomplete="off" />
							<div class="project-dropdown" id="manual-project-dropdown"></div>
						</div>
					</div>
					<div class="field">
						<label>Start</label>
						<input id="manual-start" type="datetime-local" />
					</div>
					<div class="field">
						<label>End</label>
						<input id="manual-end" type="datetime-local" />
					</div>
					<button class="btn-add" id="btn-add" title="Add entry">+</button>
				</div>
			</div>

			<div class="entries-header">
				<div class="entries-title">Entries</div>
				<div class="entries-total" id="entries-total"></div>
			</div>
			<div class="entries-list" id="entries-list">
				<div class="empty">No entries yet — start the timer or add one manually.</div>
			</div>

		</div>

		<div class="toast" id="toast"></div>
		<script type="module" src="script.js"></script>
	</body>
</html>
